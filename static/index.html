<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Intelligence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: #0f0f0f;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 60px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        /* Left Column: Search */
        .search-section {
            display: flex;
            flex-direction: column;
        }

        .search-section h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #fff;
        }

        .search-section .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }

        .search-input {
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #333;
            border-radius: 6px;
            background-color: #1a1a1a;
            color: #e0e0e0;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: #4a9eff;
        }

        .search-button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            background-color: #4a9eff;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .search-button:hover:not(:disabled) {
            background-color: #2a7fd9;
        }

        .search-button:disabled {
            background-color: #2a5a99;
            cursor: not-allowed;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Right Column: Briefing Output */
        .briefing-section {
            display: none;
            padding: 30px;
            background-color: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
        }

        .briefing-section.show {
            display: block;
        }

        .briefing-section h2 {
            font-size: 24px;
            margin-bottom: 24px;
            color: #4a9eff;
        }

        .briefing-item {
            margin-bottom: 24px;
        }

        .briefing-item h3 {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            margin-bottom: 12px;
        }

        .briefing-item p {
            font-size: 14px;
            line-height: 1.7;
            color: #c0c0c0;
        }

        /* Tech Stack Chips */
        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            display: inline-block;
            padding: 6px 12px;
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 20px;
            font-size: 12px;
            color: #a0a0a0;
            white-space: nowrap;
        }

        /* Lists */
        .briefing-list {
            list-style: none;
            padding: 0;
        }

        .briefing-list li {
            padding: 8px 0;
            padding-left: 20px;
            position: relative;
            font-size: 14px;
            color: #c0c0c0;
        }

        .briefing-list li:before {
            content: "•";
            position: absolute;
            left: 0;
            color: #4a9eff;
        }

        /* Interview Questions - Prominent Styling */
        .interview-questions {
            background-color: #0a2a4a;
            border-left: 4px solid #4a9eff;
            padding: 16px;
            border-radius: 4px;
            margin-top: 12px;
        }

        .interview-questions ol {
            margin: 0;
            padding-left: 20px;
        }

        .interview-questions li {
            padding: 10px 0;
            font-size: 14px;
            color: #fff;
            line-height: 1.7;
        }

        /* Copy Button */
        .copy-button {
            padding: 8px 16px;
            font-size: 12px;
            background-color: #2a4a6a;
            color: #4a9eff;
            border: 1px solid #4a9eff;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .copy-button:hover {
            background-color: #3a5a7a;
        }

        .copy-button.copied {
            background-color: #2a5a4a;
            color: #66bb6a;
            border-color: #66bb6a;
        }

        /* Recent Searches */
        .recent-section {
            margin-top: 60px;
        }

        .recent-section h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #fff;
        }

        .recent-list {
            list-style: none;
            padding: 0;
        }

        .recent-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .recent-item:hover {
            border-color: #4a9eff;
            background-color: #0f2a4a;
        }

        .recent-item-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .recent-item-name {
            font-weight: 500;
            color: #4a9eff;
            font-size: 14px;
        }

        .recent-item-date {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .delete-btn {
            padding: 6px 12px;
            font-size: 12px;
            background-color: #3a1a1a;
            color: #ff6b6b;
            border: 1px solid #6b2a2a;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background-color: #5a2a2a;
            border-color: #ff6b6b;
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <!-- Left Column: Search -->
            <div class="search-section">
                <h1>Company Intelligence</h1>
                <p class="subtitle">Enter a company name to generate your interview briefing</p>
                
                <input 
                    type="text" 
                    class="search-input" 
                    id="companyInput" 
                    placeholder="e.g. Giftogram, Five Rivers IT, Accel Learning"
                >
                <button class="search-button" id="searchBtn">Generate Briefing</button>
                
                <div class="error-message" id="errorMessage"></div>
            </div>

            <!-- Right Column: Briefing Output -->
            <div class="briefing-section" id="briefingSection">
                <h2 id="companyName"></h2>
                
                <div class="briefing-item">
                    <h3>Overview</h3>
                    <p id="summary"></p>
                </div>

                <div class="briefing-item">
                    <h3>Tech Stack</h3>
                    <div class="tech-stack" id="techStack"></div>
                </div>

                <div class="briefing-item">
                    <h3>Recent News</h3>
                    <ul class="briefing-list" id="recentNews"></ul>
                </div>

                <div class="briefing-item">
                    <h3>Strategic Priorities</h3>
                    <ul class="briefing-list" id="strategicPriorities"></ul>
                </div>

                <div class="briefing-item">
                    <h3>Questions to Ask</h3>
                    <div class="interview-questions">
                        <ol id="interviewQuestions"></ol>
                    </div>
                </div>

                <div class="briefing-item">
                    <h3>Culture & Values</h3>
                    <p id="cultureNotes"></p>
                </div>

                <button class="copy-button" id="copyBtn">Copy All</button>
            </div>
        </div>

        <!-- Recent Searches -->
        <div class="recent-section">
            <h3>Recent Searches</h3>
            <ul class="recent-list" id="recentList">
                <div class="empty-state">No searches yet</div>
            </ul>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('companyInput');
        const searchBtn = document.getElementById('searchBtn');
        const errorMessage = document.getElementById('errorMessage');
        const briefingSection = document.getElementById('briefingSection');
        const copyBtn = document.getElementById('copyBtn');
        const recentList = document.getElementById('recentList');

        // Load history on page load
        async function loadHistory() {
            try {
                const response = await fetch('/history');
                const history = await response.json();
                renderRecentSearches(history);
            } catch (err) {
                console.error('Error loading history:', err);
            }
        }

        // Render recent searches
        function renderRecentSearches(history) {
            if (history.length === 0) {
                recentList.innerHTML = '<div class="empty-state">No searches yet</div>';
                return;
            }

            recentList.innerHTML = history.map(entry => {
                const date = new Date(entry.created_at);
                const dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                return `
                    <li class="recent-item" data-id="${entry.id}">
                        <div class="recent-item-info" style="cursor: pointer; flex: 1;">
                            <span class="recent-item-name">${entry.company_name}</span>
                            <span class="recent-item-date">${dateStr}</span>
                        </div>
                        <button class="delete-btn" onclick="deleteEntry('${entry.id}', event)">Delete</button>
                    </li>
                `;
            }).join('');

            // Add click handlers for recent items (excluding delete button)
            document.querySelectorAll('.recent-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    if (!e.target.closest('.delete-btn')) {
                        const id = this.dataset.id;
                        loadAndDisplayEntry(id);
                    }
                });
            });
        }

        // Load and display a specific entry
        async function loadAndDisplayEntry(entryId) {
            try {
                const response = await fetch('/history');
                const history = await response.json();
                const entry = history.find(e => e.id === entryId);
                if (entry) {
                    displayBriefing(entry.company_name, entry.briefing);
                    searchInput.value = entry.company_name;
                }
            } catch (err) {
                showError('Failed to load briefing');
            }
        }

        // Delete an entry
        async function deleteEntry(entryId, event) {
            event.stopPropagation();
            try {
                const response = await fetch(`/history/${entryId}`, { method: 'DELETE' });
                if (response.ok) {
                    loadHistory();
                } else {
                    showError('Failed to delete entry');
                }
            } catch (err) {
                showError('Error deleting entry');
            }
        }

        // Show error message
        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        // Display briefing
        function displayBriefing(companyName, briefing) {
            document.getElementById('companyName').textContent = companyName;
            document.getElementById('summary').textContent = briefing.summary;
            
            const techStackDiv = document.getElementById('techStack');
            techStackDiv.innerHTML = briefing.tech_stack.map(tech => 
                `<span class="chip">${tech}</span>`
            ).join('');
            
            const newsList = document.getElementById('recentNews');
            newsList.innerHTML = briefing.recent_news.map(news => 
                `<li>${news}</li>`
            ).join('');
            
            const prioritiesList = document.getElementById('strategicPriorities');
            prioritiesList.innerHTML = briefing.strategic_priorities.map(priority => 
                `<li>${priority}</li>`
            ).join('');
            
            const questionsList = document.getElementById('interviewQuestions');
            questionsList.innerHTML = briefing.interview_questions.map(question => 
                `<li>${question}</li>`
            ).join('');
            
            document.getElementById('cultureNotes').textContent = briefing.culture_notes;
            
            briefingSection.classList.add('show');
        }

        // Copy all briefing content
        copyBtn.addEventListener('click', function() {
            const company = document.getElementById('companyName').textContent;
            const summary = document.getElementById('summary').textContent;
            const techStack = Array.from(document.querySelectorAll('#techStack .chip')).map(c => c.textContent).join(', ');
            const news = Array.from(document.querySelectorAll('#recentNews li')).map(li => '• ' + li.textContent).join('\n');
            const priorities = Array.from(document.querySelectorAll('#strategicPriorities li')).map(li => '• ' + li.textContent).join('\n');
            const questions = Array.from(document.querySelectorAll('#interviewQuestions li')).map((li, i) => (i+1) + '. ' + li.textContent).join('\n');
            const culture = document.getElementById('cultureNotes').textContent;

            const fullText = `COMPANY INTELLIGENCE BRIEFING: ${company}

OVERVIEW
${summary}

TECH STACK
${techStack}

RECENT NEWS
${news}

STRATEGIC PRIORITIES
${priorities}

QUESTIONS TO ASK
${questions}

CULTURE & VALUES
${culture}`;

            navigator.clipboard.writeText(fullText).then(() => {
                copyBtn.classList.add('copied');
                copyBtn.textContent = 'Copied!';
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtn.textContent = 'Copy All';
                }, 2000);
            }).catch(err => {
                showError('Failed to copy to clipboard');
            });
        });

        // Search button click
        searchBtn.addEventListener('click', async function() {
            const company = searchInput.value.trim();
            
            if (!company) {
                showError('Please enter a company name');
                return;
            }

            errorMessage.classList.remove('show');
            searchBtn.disabled = true;
            searchBtn.textContent = 'Researching...';

            try {
                const response = await fetch('/brief', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ company_name: company })
                });

                if (!response.ok) {
                    const error = await response.json();
                    showError(error.detail?.error || 'Error generating briefing');
                    return;
                }

                const entry = await response.json();
                displayBriefing(entry.company_name, entry.briefing);
                loadHistory();
            } catch (err) {
                showError('Network error: ' + err.message);
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = 'Generate Briefing';
            }
        });

        // Allow Enter key to search
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchBtn.click();
            }
        });

        // Load history on page load
        loadHistory();
    </script>
</body>
</html>
